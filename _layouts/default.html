<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 18px;
      line-height: 1.7;
      color: #1a1a2e;
      background: #fafafa;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #2d2d5e 100%);
      color: #e0e0e0;
      padding: 3rem 2rem;
      text-align: center;
    }

    header .site-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    header .site-description {
      font-size: 1.1rem;
      color: #b0b0d0;
      font-weight: 300;
    }

    header .meta {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #9090b0;
    }

    header .meta span {
      margin: 0 1rem;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    @media (min-width: 1200px) {
      .container { max-width: 1100px; }
    }

    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #1a1a2e; letter-spacing: -0.02em; }
    h2 { font-size: 1.5rem; margin-top: 3rem; margin-bottom: 0.75rem; color: #1a1a2e; padding-top: 1.5rem; border-top: 1px solid #eee; }
    h2:first-of-type { margin-top: 1.5rem; padding-top: 0; border-top: none; }
    h3 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #2d2d5e; }

    p { margin-bottom: 1rem; }
    a { color: #2563eb; }

    ul, ol { margin-bottom: 1rem; padding-left: 1.5rem; }
    li { margin-bottom: 0.3rem; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    th, td {
      text-align: left;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #e0e0e0;
    }
    th { background: #f0f0f5; font-weight: 600; color: #1a1a2e; }

    blockquote {
      border-left: 3px solid #2563eb;
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      color: #444;
      background: #f5f5ff;
    }

    hr {
      border: none;
      border-top: 2px solid #2563eb;
      margin: 3rem 0;
      width: 60px;
    }

    strong { color: #1a1a2e; }

    /* Option cards */
    h2 {
      position: relative;
    }

    /* Recommendation highlight */
    .container > h2 + p + p,
    .container > h2 + p {
      font-size: 1rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #999;
      font-size: 0.85rem;
      border-top: 1px solid #eee;
      background: #f5f5f5;
    }

    footer a { color: #666; text-decoration: none; }
    footer a:hover { color: #2563eb; }

    /* Print styles */
    @media print {
      header { background: #1a1a2e !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .container { max-width: 100%; padding: 1rem; }
      body { font-size: 14px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="site-title">{{ site.title }}</div>
    <div class="site-description">Integrated Monthly Retainer — Advisory + Development</div>
    <div class="meta">
      <span>Prepared for: JJG Manufacturing</span>
      <span>Prepared by: Xorworks</span>
      <span>March 23, 2026</span>
    </div>
  </header>

  <div class="container">
    {{ content }}
  </div>

  <footer>
    <a href="https://xorworks.com">Xorworks</a> &mdash; AI Solutions for Manufacturing
  </footer>
</body>
</html>
